<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <h2>Edit Product</h2>
        <form th:action="@{/products/edit}" th:object="${product}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{image}">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" th:field="*{name}">
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Price</label>
                <input type="number" step="1" class="form-control" th:field="*{price}">
                <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" th:field="*{category.id}">
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${listCategory}" th:value="${cat.id}" th:text="${cat.name}"
                        th:selected="${cat.id == product.category?.id}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Current Image</label><br>
                <img th:if="${product.image != null}" th:src="@{${product.image}}" alt="Product Image"
                    style="max-width: 150px; display:block; margin-bottom:10px;" />
                <span th:if="${product.image == null}">No Image</span>
            </div>

            <div class="mb-3">
                <label class="form-label">Upload New Image (optional)</label>
                <input type="file" class="form-control" name="imageProduct" accept="image/png, image/jpeg">
            </div>

            <button type="submit" class="btn btn-primary">Update</button>
            <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>

</html>
