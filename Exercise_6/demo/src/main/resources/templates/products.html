<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Space Grotesk", sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-rose-100 text-slate-800">
<div class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div class="rounded-3xl border border-white/70 bg-white/80 p-6 shadow-2xl shadow-orange-200/40 backdrop-blur sm:p-8">
        <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <p class="text-sm font-semibold uppercase tracking-[0.2em] text-orange-500">Inventory</p>
                <h1 class="mt-1 text-3xl font-bold text-slate-900">Product Catalog</h1>
            </div>
            <div class="flex flex-wrap gap-2">
                <a th:href="@{/categories}"
                   class="inline-flex items-center justify-center rounded-xl border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                    Manage Categories
                </a>
                <a th:href="@{/products/create}"
                   class="inline-flex items-center justify-center rounded-xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-slate-700">
                    Add New Product
                </a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit"
                            class="inline-flex items-center justify-center rounded-xl border border-rose-300 px-5 py-3 text-sm font-semibold text-rose-600 transition hover:bg-rose-50">
                        Logout
                    </button>
                </form>
            </div>
        </div>

        <div class="overflow-hidden rounded-2xl border border-slate-200">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-900 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">ID</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Name</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Image</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Price</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Category</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Action</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 bg-white">
                    <tr th:each="product : ${listproduct}" class="transition hover:bg-orange-50/70">
                        <td class="px-4 py-3 text-sm font-medium" th:text="${product.id}"></td>
                        <td class="px-4 py-3 text-sm" th:text="${product.name}"></td>
                        <td class="px-4 py-3">
                            <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                                 th:src="${product.image}" alt="Product image"
                                 class="h-14 w-14 rounded-lg border border-slate-200 object-cover">
                            <span th:if="${product.image == null or #strings.isEmpty(product.image)}"
                                  class="text-xs font-medium text-slate-400">N/A</span>
                        </td>
                        <td class="px-4 py-3 text-sm font-semibold text-emerald-700" th:text="${product.price}"></td>
                        <td class="px-4 py-3 text-sm" th:text="${product.category != null ? product.category.name : 'N/A'}"></td>
                        <td class="px-4 py-3">
                            <div class="flex flex-wrap gap-2">
                                <a th:href="@{/products/{id}(id=${product.id})}"
                                   class="inline-flex rounded-lg border border-slate-300 px-3 py-1.5 text-xs font-semibold text-slate-700 transition hover:bg-slate-50">
                                    View
                                </a>
                                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                                   class="inline-flex rounded-lg bg-amber-500 px-3 py-1.5 text-xs font-semibold text-white transition hover:bg-amber-600">
                                    Edit
                                </a>
                                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                                   class="inline-flex rounded-lg bg-rose-500 px-3 py-1.5 text-xs font-semibold text-white transition hover:bg-rose-600"
                                   onclick="return confirm('Are you sure you want to delete this item?');">
                                    Delete
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
