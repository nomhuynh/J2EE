<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Space Grotesk", sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-rose-100 text-slate-800">
<div class="mx-auto max-w-4xl px-4 py-10 sm:px-6 lg:px-8">
    <div class="rounded-3xl border border-white/70 bg-white/80 p-6 shadow-2xl shadow-orange-200/40 backdrop-blur sm:p-8">
        <div class="flex flex-col gap-6 md:flex-row">
            <div class="w-full md:w-1/2">
                <div class="aspect-square overflow-hidden rounded-2xl border border-slate-200 bg-white">
                    <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                         th:src="${product.image}" alt="Product image"
                         class="h-full w-full object-cover">
                    <div th:if="${product.image == null or #strings.isEmpty(product.image)}"
                         class="flex h-full w-full items-center justify-center text-sm font-semibold text-slate-400">
                        No Image
                    </div>
                </div>
            </div>
            <div class="w-full md:w-1/2">
                <p class="text-sm font-semibold uppercase tracking-[0.2em] text-orange-500">Product</p>
                <h1 class="mt-2 text-3xl font-bold text-slate-900" th:text="${product.name}">Product Name</h1>
                <p class="mt-3 text-sm text-slate-600">
                    Category:
                    <span class="font-semibold text-slate-800" th:text="${product.category != null ? product.category.name : 'N/A'}"></span>
                </p>
                <p class="mt-4 text-2xl font-bold text-emerald-700" th:text="${product.price}">$0.00</p>

                <div class="mt-8 flex flex-wrap gap-3">
                    <a th:href="@{/products}"
                       class="inline-flex items-center justify-center rounded-xl border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                        Back to List
                    </a>
                    <form th:action="@{/logout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit"
                                class="inline-flex items-center justify-center rounded-xl border border-rose-300 px-5 py-3 text-sm font-semibold text-rose-600 transition hover:bg-rose-50">
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
